<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leafdoor Suite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        /* App selector tabs */
        .app-tabs {
            display: flex;
            gap: 5px;
            padding: 0 20px;
            margin-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 10px;
        }

        .app-tab {
            padding: 8px 16px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .app-tab:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .app-tab.active {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .app-tab:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Mode selector */
        .mode-selector {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 8px 16px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
            color: #333;
        }

        .mode-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .mode-btn:hover {
            border-color: #667eea;
        }

        .display-section {
            padding: 25px 20px;
            background: linear-gradient(to bottom, #f8f9fa, #ffffff);
            border-bottom: 1px solid #e0e0e0;
        }

        .previous-operand {
            font-size: 24px;
            color: #999;
            min-height: 28px;
            text-align: right;
            margin-bottom: 8px;
        }

        .current-display {
            font-size: 48px;
            font-weight: 600;
            color: #333;
            word-wrap: break-word;
            word-break: break-all;
            text-align: right;
            min-height: 60px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            font-family: 'Monaco', 'Courier New', monospace;
        }

        .buttons-section {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .number-btn {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            text-transform: none;
        }

        .number-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #e8ecf1 0%, #b3cfe2 100%);
        }

        .operator-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .operator-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #5568d3 0%, #6a3d92 100%);
        }

        .function-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .function-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #e083eb 0%, #e5476c 100%);
        }

        .equals-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            grid-column: span 2;
            font-size: 20px;
        }

        .equals-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #3f9cee 0%, #00e2ee 100%);
        }

        .clear-btn {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
            grid-column: span 2;
            font-size: 16px;
        }

        .clear-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #f5608a 0%, #fed130 100%);
        }

        .delete-btn {
            background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%);
            color: white;
        }

        .delete-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #ff8a46 0%, #ff5a78 100%);
        }

        /* Mobile only: Show number buttons and delete button */
        .mobile-number-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 0;
        }

        .mobile-only {
            display: block;
        }

        @media (min-width: 768px) {
            .mobile-only {
                display: none;
            }
        }

        .history-section {
            max-height: 150px;
            overflow-y: auto;
            background: #f8f9fa;
            padding: 15px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #666;
        }

        .history-item {
            padding: 5px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        /* App visibility toggle */
        .app-content {
            display: none;
        }

        .app-content.active {
            display: block;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .app-container {
                border-radius: 20px;
            }

            .current-display {
                font-size: 36px;
            }

            .previous-operand {
                font-size: 18px;
            }

            button {
                padding: 14px;
                font-size: 16px;
            }

            .buttons-section {
                gap: 10px;
                padding: 15px;
            }

            .mode-selector {
                padding: 10px;
                gap: 8px;
            }

            .mode-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }

        .keyboard-hint {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 15px;
            text-align: center;
            color: #999;
        }

        @media (max-width: 768px) {
            .keyboard-hint {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>✨ Leafdoor Suite</h1>
            <div class="app-tabs">
                <button class="app-tab active" data-app="calculator">Calculator</button>
                <button class="app-tab" data-app="solver" disabled title="Coming soon">Solver</button>
                <button class="app-tab" data-app="graphing" disabled title="Coming soon">Graphing</button>
            </div>
        </div>

        <!-- CALCULATOR APP -->
        <div id="calculator-app" class="app-content active">
            <!-- Mode selector for Calculator -->
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="standard">Standard</button>
                <button class="mode-btn" data-mode="trigonometry">Trigonometry</button>
                <button class="mode-btn" data-mode="middle-school">Middle School</button>
                <button class="mode-btn" data-mode="high-school">High School</button>
            </div>

            <div class="display-section">
                <div class="previous-operand" id="previousOperand"></div>
                <div class="current-display" id="currentDisplay">0</div>
            </div>

            <div class="buttons-section" id="buttonsSection">
                <!-- Buttons will be dynamically generated based on mode -->
            </div>

            <!-- Mobile number pad (shown only on mobile) -->
            <div id="mobileNumberPad" style="display: none; padding: 0 20px 20px 20px;">
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
                    <button class="number-btn" data-action="appendNumber" data-number="7">7</button>
                    <button class="number-btn" data-action="appendNumber" data-number="8">8</button>
                    <button class="number-btn" data-action="appendNumber" data-number="9">9</button>
                    <button class="delete-btn" data-action="delete">←</button>

                    <button class="number-btn" data-action="appendNumber" data-number="4">4</button>
                    <button class="number-btn" data-action="appendNumber" data-number="5">5</button>
                    <button class="number-btn" data-action="appendNumber" data-number="6">6</button>
                    <button class="operator-btn" data-action="operation" data-operator="×">×</button>

                    <button class="number-btn" data-action="appendNumber" data-number="1">1</button>
                    <button class="number-btn" data-action="appendNumber" data-number="2">2</button>
                    <button class="number-btn" data-action="appendNumber" data-number="3">3</button>
                    <button class="operator-btn" data-action="operation" data-operator="÷">÷</button>

                    <button class="number-btn" data-action="appendNumber" data-number="0" style="grid-column: span 2;">0</button>
                    <button class="number-btn" data-action="appendDecimal">.</button>
                    <button class="operator-btn" data-action="operation" data-operator="+">+</button>
                </div>
            </div>

            <div class="history-section" id="historySection">
                <div style="text-align: center; color: #999;">Calculation history will appear here</div>
            </div>

            <div class="keyboard-hint">
                💡 Tip: Use keyboard for quick input (numbers, +−×÷, Enter, Backspace)
            </div>
        </div>

        <!-- SOLVER APP (Disabled for now) -->
        <div id="solver-app" class="app-content">
            <div style="padding: 40px 20px; text-align: center; color: #999;">
                <p>Solver app coming soon!</p>
            </div>
        </div>

        <!-- GRAPHING APP (Disabled for now) -->
        <div id="graphing-app" class="app-content">
            <div style="padding: 40px 20px; text-align: center; color: #999;">
                <p>Graphing app coming soon!</p>
            </div>
        </div>
    </div>

    <script>
        /**
         * ============================================================================
         * LEAFDOOR SUITE - Multi-App Calculator Platform
         * ============================================================================
         * 
         * This application provides a modular, extensible platform for mathematical
         * tools. Currently only the Calculator app is enabled.
         * 
         * Architecture:
         * 1. AppManager - Handles switching between different apps (Calculator, Solver, etc.)
         * 2. Calculator - Core calculator logic with multiple modes
         * 3. ButtonGrids - Define different button layouts for each mode
         * 4. Display Manager - Handles rendering output (separate from internal state)
         * 
         * Key Improvements:
         * - Internal state stores numeric values, not parsed strings
         * - Parse/format roundtrips eliminated: we work with numbers directly
         * - Mode system allows different button layouts and feature sets
         * - Extensible app architecture for future additions
         * - Mobile number pad for easy touch input on phones
         */

        // ============================================================================
        // APP MANAGER - Handles switching between apps
        // ============================================================================
        
        class AppManager {
            /**
             * Manages app switching and initialization
             */
            constructor() {
                this.currentApp = 'calculator';
                this.apps = {};
                this.setupAppTabs();
            }

            registerApp(appName, appInstance) {
                this.apps[appName] = appInstance;
            }

            setupAppTabs() {
                const tabs = document.querySelectorAll('.app-tab');
                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        if (tab.disabled) return;
                        this.switchApp(tab.dataset.app);
                    });
                });
            }

            switchApp(appName) {
                if (!this.apps[appName] || this.currentApp === appName) return;

                // Hide current app
                document.getElementById(`${this.currentApp}-app`).classList.remove('active');
                document.querySelector(`[data-app="${this.currentApp}"]`).classList.remove('active');

                // Show new app
                this.currentApp = appName;
                document.getElementById(`${this.currentApp}-app`).classList.add('active');
                document.querySelector(`[data-app="${this.currentApp}"]`).classList.add('active');

                // Initialize app if needed
                if (this.apps[appName].init) {
                    this.apps[appName].init();
                }
            }
        }

        // ============================================================================
        // BUTTON GRID DEFINITIONS - Different button layouts for different modes
        // ============================================================================
        
        /**
         * Each mode defines which buttons are available and their layout.
         * Button format: {label, action, operator?, value?}
         * Actions: 'operation', 'clear', 'delete', 'equals', or a function name like 'sqrt', 'sine', etc.
         */
        const BUTTON_GRIDS = {
            // STANDARD MODE: Basic arithmetic operations suitable for everyday use
            standard: [
                // Row 1: Division, Multiply, Subtract, Add (upper operations)
                { label: '÷', action: 'operation', operator: '÷', classes: 'operator-btn' },
                { label: '×', action: 'operation', operator: '×', classes: 'operator-btn' },
                { label: '−', action: 'operation', operator: '-', classes: 'operator-btn' },
                { label: '+', action: 'operation', operator: '+', classes: 'operator-btn' },

                // Row 2: Power, Square, Square Root, Percent
                { label: 'x^y', action: 'power', classes: 'function-btn' },
                { label: 'x²', action: 'square', classes: 'function-btn' },
                { label: '√', action: 'sqrt', classes: 'function-btn' },
                { label: '%', action: 'percent', classes: 'function-btn' },

                // Row 3: Reciprocal, Toggle Sign, Parentheses
                { label: '1/x', action: 'reciprocal', classes: 'function-btn' },
                { label: '±', action: 'toggleSign', classes: 'function-btn' },
                { label: '(', action: 'parenthesis', value: '(', classes: 'function-btn' },
                { label: ')', action: 'parenthesis', value: ')', classes: 'function-btn' },

                // Row 4: Clear and Equals
                { label: 'CLEAR', action: 'clear', classes: 'clear-btn', span: 2 },
                { label: '=', action: 'equals', classes: 'equals-btn', span: 2 },
            ],

            // TRIGONOMETRY MODE: Includes trig functions and constants
            trigonometry: [
                // Row 1: Trig functions
                { label: 'sin', action: 'sine', classes: 'function-btn' },
                { label: 'cos', action: 'cosine', classes: 'function-btn' },
                { label: 'tan', action: 'tangent', classes: 'function-btn' },
                { label: 'asin', action: 'arcsine', classes: 'function-btn' },

                // Row 2: Inverse trig and logs
                { label: 'acos', action: 'arccosine', classes: 'function-btn' },
                { label: 'atan', action: 'arctangent', classes: 'function-btn' },
                { label: 'ln', action: 'ln', classes: 'function-btn' },
                { label: 'log', action: 'log', classes: 'function-btn' },

                // Row 3: Constants and operations
                { label: 'π', action: 'pi', classes: 'function-btn' },
                { label: 'e', action: 'euler', classes: 'function-btn' },
                { label: 'deg/rad', action: 'toggleAngleMode', classes: 'function-btn' },
                { label: '1/x', action: 'reciprocal', classes: 'function-btn' },

                // Row 4: Basic operations
                { label: '÷', action: 'operation', operator: '÷', classes: 'operator-btn' },
                { label: '×', action: 'operation', operator: '×', classes: 'operator-btn' },
                { label: '−', action: 'operation', operator: '-', classes: 'operator-btn' },
                { label: '+', action: 'operation', operator: '+', classes: 'operator-btn' },

                // Row 5: Clear and Equals
                { label: 'CLEAR', action: 'clear', classes: 'clear-btn', span: 2 },
                { label: '=', action: 'equals', classes: 'equals-btn', span: 2 },
            ],

            // MIDDLE SCHOOL MODE: Limited to age-appropriate operations
            'middle-school': [
                { label: '÷', action: 'operation', operator: '÷', classes: 'operator-btn' },
                { label: '×', action: 'operation', operator: '×', classes: 'operator-btn' },
                { label: '−', action: 'operation', operator: '-', classes: 'operator-btn' },
                { label: '+', action: 'operation', operator: '+', classes: 'operator-btn' },

                { label: 'x²', action: 'square', classes: 'function-btn' },
                { label: '√', action: 'sqrt', classes: 'function-btn' },
                { label: '%', action: 'percent', classes: 'function-btn' },
                { label: '1/x', action: 'reciprocal', classes: 'function-btn' },

                { label: 'CLEAR', action: 'clear', classes: 'clear-btn', span: 2 },
                { label: '=', action: 'equals', classes: 'equals-btn', span: 2 },
            ],

            // HIGH SCHOOL MODE: Extended scientific functions
            'high-school': [
                { label: 'sin', action: 'sine', classes: 'function-btn' },
                { label: 'cos', action: 'cosine', classes: 'function-btn' },
                { label: 'tan', action: 'tangent', classes: 'function-btn' },
                { label: 'x^y', action: 'power', classes: 'function-btn' },

                { label: 'ln', action: 'ln', classes: 'function-btn' },
                { label: 'log', action: 'log', classes: 'function-btn' },
                { label: 'π', action: 'pi', classes: 'function-btn' },
                { label: 'e', action: 'euler', classes: 'function-btn' },

                { label: '√', action: 'sqrt', classes: 'function-btn' },
                { label: 'x²', action: 'square', classes: 'function-btn' },
                { label: 'n!', action: 'factorial', classes: 'function-btn' },
                { label: '|x|', action: 'abs', classes: 'function-btn' },

                { label: '÷', action: 'operation', operator: '÷', classes: 'operator-btn' },
                { label: '×', action: 'operation', operator: '×', classes: 'operator-btn' },
                { label: '−', action: 'operation', operator: '-', classes: 'operator-btn' },
                { label: '+', action: 'operation', operator: '+', classes: 'operator-btn' },

                { label: 'CLEAR', action: 'clear', classes: 'clear-btn', span: 2 },
                { label: '=', action: 'equals', classes: 'equals-btn', span: 2 },
            ],
        };

        // ============================================================================
        // CALCULATOR CLASS - Core calculation engine
        // ============================================================================
        
        class Calculator {
            /**
             * Main calculator engine that handles all mathematical operations.
             * 
             * Key Design:
             * - currentInput: Raw string being typed (displayed to user)
             * - currentValue: Actual numeric value (used for calculations)
             * - previousValue: Previous numeric value
             * - operator: The pending operation (+, -, *, /)
             * - history: List of completed calculations
             * 
             * Separation of concerns:
             * - Internal state: raw strings for display, numeric values for math
             * - Display: formatting only (no state changes)
             * - Execution: only happens on explicit user actions (=, equals)
             */
            constructor() {
                this.currentInput = '0';        // What user sees typed
                this.currentValue = 0;          // Actual numeric value (NO STRING ROUNDTRIPS!)
                this.previousValue = 0;         // Value from before operator was pressed
                this.operator = null;           // Current pending operator
                this.history = [];              // List of calculations
                this.mode = 'standard';         // Current calculator mode
                this.angleMode = 'degrees';     // 'degrees' or 'radians' for trig functions
                
                // DOM elements
                this.currentDisplay = document.getElementById('currentDisplay');
                this.previousOperand = document.getElementById('previousOperand');
                this.historySection = document.getElementById('historySection');
                this.buttonsSection = document.getElementById('buttonsSection');
                this.mobileNumberPad = document.getElementById('mobileNumberPad');
                
                this.setupEventListeners();
                this.setupKeyboardListeners();
                this.setupModeSelector();
                this.setupMobileDetection();
                this.renderButtons();
                this.updateDisplay();
            }

            /**
             * Detect mobile and show/hide number pad accordingly
             */
            setupMobileDetection() {
                const isMobile = () => window.innerWidth < 768;
                const updateMobileView = () => {
                    this.mobileNumberPad.style.display = isMobile() ? 'block' : 'none';
                };
                
                updateMobileView();
                window.addEventListener('resize', updateMobileView);

                // Setup mobile number pad listeners
                this.mobileNumberPad.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'BUTTON') return;
                    const action = e.target.dataset.action;
                    const number = e.target.dataset.number;
                    const operator = e.target.dataset.operator;

                    if (action === 'appendNumber') {
                        this.appendNumberDirect(parseInt(number));
                    } else if (action === 'appendDecimal') {
                        this.appendDecimal();
                    } else if (action === 'operation') {
                        this.setOperator(operator);
                    } else if (action === 'delete') {
                        this.deleteLastCharacter();
                    }
                    this.updateDisplay();
                });
            }

            /**
             * Setup mode switching UI
             */
            setupModeSelector() {
                const modeBtns = document.querySelectorAll('.mode-btn');
                modeBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        modeBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.switchMode(btn.dataset.mode);
                    });
                });
            }

            /**
             * Switch to a different calculator mode and re-render buttons
             * @param {string} mode - 'standard', 'trigonometry', 'middle-school', or 'high-school'
             */
            switchMode(mode) {
                this.mode = mode;
                this.renderButtons();
            }

            /**
             * Dynamically render buttons based on current mode
             * This happens when mode changes, so buttons are always appropriate
             */
            renderButtons() {
                const grid = BUTTON_GRIDS[this.mode];
                this.buttonsSection.innerHTML = '';

                grid.forEach(buttonConfig => {
                    const button = document.createElement('button');
                    button.textContent = buttonConfig.label;
                    button.className = buttonConfig.classes;
                    
                    // Add grid column span if specified
                    if (buttonConfig.span) {
                        button.style.gridColumn = `span ${buttonConfig.span}`;
                    }

                    // Store action and parameters for click handler
                    button.dataset.action = buttonConfig.action;
                    if (buttonConfig.operator) button.dataset.operator = buttonConfig.operator;
                    if (buttonConfig.value) button.dataset.value = buttonConfig.value;

                    this.buttonsSection.appendChild(button);
                });
            }

            /**
             * Attach button click handlers
             */
            setupEventListeners() {
                this.buttonsSection.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'BUTTON') return;

                    const action = e.target.dataset.action;
                    const operator = e.target.dataset.operator;
                    const value = e.target.dataset.value;

                    // Route to appropriate handler based on action
                    this.handleAction(action, operator, value);
                    this.updateDisplay();
                });
            }

            /**
             * Unified action handler routes to specific methods
             * @param {string} action - Action type
             * @param {string} operator - Operator symbol if applicable
             * @param {string} value - Value if applicable
             */
            handleAction(action, operator, value) {
                switch (action) {
                    case 'operation':
                        this.setOperator(operator);
                        break;
                    case 'equals':
                        this.compute();
                        break;
                    case 'clear':
                        this.clear();
                        break;
                    case 'delete':
                        this.deleteLastCharacter();
                        break;
                    case 'square':
                        this.applyUnaryFunction('square');
                        break;
                    case 'sqrt':
                        this.applyUnaryFunction('sqrt');
                        break;
                    case 'reciprocal':
                        this.applyUnaryFunction('reciprocal');
                        break;
                    case 'percent':
                        this.applyUnaryFunction('percent');
                        break;
                    case 'sine':
                        this.applyUnaryFunction('sine');
                        break;
                    case 'cosine':
                        this.applyUnaryFunction('cosine');
                        break;
                    case 'tangent':
                        this.applyUnaryFunction('tangent');
                        break;
                    case 'arcsine':
                        this.applyUnaryFunction('arcsine');
                        break;
                    case 'arccosine':
                        this.applyUnaryFunction('arccosine');
                        break;
                    case 'arctangent':
                        this.applyUnaryFunction('arctangent');
                        break;
                    case 'ln':
                        this.applyUnaryFunction('ln');
                        break;
                    case 'log':
                        this.applyUnaryFunction('log');
                        break;
                    case 'factorial':
                        this.applyUnaryFunction('factorial');
                        break;
                    case 'abs':
                        this.applyUnaryFunction('abs');
                        break;
                    case 'toggleSign':
                        this.toggleSign();
                        break;
                    case 'toggleAngleMode':
                        this.toggleAngleMode();
                        break;
                    case 'power':
                        this.setOperator('^');
                        break;
                    case 'pi':
                        this.appendConstant('π', Math.PI);
                        break;
                    case 'euler':
                        this.appendConstant('e', Math.E);
                        break;
                    case 'parenthesis':
                        this.appendNumberDirect(value);
                        break;
                }
            }

            /**
             * Toggle between degrees and radians for trigonometric functions
             */
            toggleAngleMode() {
                this.angleMode = this.angleMode === 'degrees' ? 'radians' : 'degrees';
                this.updateDisplay();
            }

            /**
             * Append a number digit directly (numeric, not string roundtrip)
             * @param {number|string} num - Digit to append
             */
            appendNumberDirect(num) {
                // If current is just '0' and we're typing a real digit, replace it
                if (this.currentInput === '0' && num !== '.' && typeof num === 'number') {
                    this.currentInput = num.toString();
                    this.currentValue = num;
                } else if (num === '.' && this.currentInput.includes('.')) {
                    // Don't add multiple decimal points
                    return;
                } else if (num === '.') {
                    this.currentInput += '.';
                    // currentValue will be updated via parseFloat when needed
                } else if (typeof num === 'number') {
                    this.currentInput += num.toString();
                    // currentValue will be updated via parseFloat when needed
                } else if (typeof num === 'string') {
                    // For parentheses and constants
                    this.currentInput += num;
                }
            }

            /**
             * Append decimal point
             */
            appendDecimal() {
                if (!this.currentInput.includes('.')) {
                    this.currentInput += '.';
                }
            }

            /**
             * Append a constant (π, e) - stores both symbol and value
             * @param {string} symbol - Symbol to display
             * @param {number} value - Numeric value
             */
            appendConstant(symbol, value) {
                if (this.currentInput === '0') {
                    this.currentInput = symbol;
                    this.currentValue = value;
                } else {
                    this.currentInput += symbol;
                }
            }

            /**
             * Delete last character from current input
             */
            deleteLastCharacter() {
                if (this.currentInput.length === 1) {
                    this.currentInput = '0';
                    this.currentValue = 0;
                } else {
                    this.currentInput = this.currentInput.slice(0, -1);
                }
            }

            /**
             * Clear everything and reset to initial state
             */
            clear() {
                this.currentInput = '0';
                this.currentValue = 0;
                this.previousValue = 0;
                this.operator = null;
            }

            /**
             * Set an operator and prepare for next number
             * If there's already an operator pending, compute first
             * @param {string} op - Operator symbol
             */
            setOperator(op) {
                if (this.currentInput === '') return;

                // Parse current input as number
                this.currentValue = this.parseExpression(this.currentInput);

                // If we already have a previous value and operator, compute first
                if (this.previousValue !== 0 && this.operator !== null) {
                    this.compute();
                    this.currentValue = this.previousValue;
                }

                this.operator = op;
                this.previousValue = this.currentValue;
                this.currentInput = '';
            }

            /**
             * Apply a unary function (operation on current value only)
             * Examples: sqrt, sin, square, etc.
             * @param {string} functionName - Name of function to apply
             */
            applyUnaryFunction(functionName) {
                let value = this.parseExpression(this.currentInput);

                switch (functionName) {
                    case 'square':
                        value = value * value;
                        break;
                    case 'sqrt':
                        value = Math.sqrt(value);
                        break;
                    case 'reciprocal':
                        value = value !== 0 ? 1 / value : 0;
                        break;
                    case 'percent':
                        value = value / 100;
                        break;
                    case 'sine':
                        const angleInRadians = this.angleMode === 'degrees' ? 
                            value * Math.PI / 180 : value;
                        value = Math.sin(angleInRadians);
                        break;
                    case 'cosine':
                        const cosAngle = this.angleMode === 'degrees' ? 
                            value * Math.PI / 180 : value;
                        value = Math.cos(cosAngle);
                        break;
                    case 'tangent':
                        const tanAngle = this.angleMode === 'degrees' ? 
                            value * Math.PI / 180 : value;
                        value = Math.tan(tanAngle);
                        break;
                    case 'arcsine':
                        value = Math.asin(value);
                        if (this.angleMode === 'degrees') value = value * 180 / Math.PI;
                        break;
                    case 'arccosine':
                        value = Math.acos(value);
                        if (this.angleMode === 'degrees') value = value * 180 / Math.PI;
                        break;
                    case 'arctangent':
                        value = Math.atan(value);
                        if (this.angleMode === 'degrees') value = value * 180 / Math.PI;
                        break;
                    case 'ln':
                        value = Math.log(value);
                        break;
                    case 'log':
                        value = Math.log10(value);
                        break;
                    case 'factorial':
                        value = this.factorial(value);
                        break;
                    case 'abs':
                        value = Math.abs(value);
                        break;
                }

                this.currentInput = this.formatForDisplay(value);
                this.currentValue = value;
                this.addHistory(`${functionName}(${this.currentInput}) = ${this.formatForDisplay(value)}`);
            }

            /**
             * Toggle sign of current value (multiply by -1)
             */
            toggleSign() {
                const value = this.parseExpression(this.currentInput);
                const newValue = value * -1;
                this.currentInput = this.formatForDisplay(newValue);
                this.currentValue = newValue;
            }

            /**
             * Compute factorial of n
             * @param {number} n
             * @returns {number} Factorial result
             */
            factorial(n) {
                n = Math.floor(n);
                if (n < 0) return NaN;
                if (n === 0 || n === 1) return 1;
                let result = 1;
                for (let i = 2; i <= n; i++) result *= i;
                return result;
            }

            /**
             * Parse an expression string to a numeric value
             * Handles constants like π and e
             * @param {string} expr - Expression to parse
             * @returns {number} Parsed value
             */
            parseExpression(expr) {
                // Replace constants with actual values
                expr = expr.replace(/π/g, Math.PI.toString());
                expr = expr.replace(/e(?![0-9.])/g, Math.E.toString());
                return parseFloat(expr) || 0;
            }

            /**
             * Format a number for display
             * If it's very long, use scientific notation
             * @param {number} value
             * @returns {string} Formatted value
             */
            formatForDisplay(value) {
                if (typeof value === 'string') return value;
                
                const str = value.toString();
                if (str.length > 15) {
                    return value.toExponential(6);
                }
                return str;
            }

            /**
             * Perform the pending calculation
             * Only happens when user explicitly requests it (=)
             */
            compute() {
                if (!this.operator || this.previousValue === 0 && this.currentValue === 0) {
                    return;
                }

                // currentValue should already be parsed
                if (typeof this.currentValue === 'string') {
                    this.currentValue = this.parseExpression(this.currentValue);
                }

                let result;

                // Perform the operation based on operator
                switch (this.operator) {
                    case '+':
                        result = this.previousValue + this.currentValue;
                        break;
                    case '-':
                        result = this.previousValue - this.currentValue;
                        break;
                    case '×':
                        result = this.previousValue * this.currentValue;
                        break;
                    case '÷':
                        result = this.currentValue !== 0 ? this.previousValue / this.currentValue : 0;
                        break;
                    case '^':
                        result = Math.pow(this.previousValue, this.currentValue);
                        break;
                    default:
                        return;
                }

                // Record in history
                const prev = this.formatForDisplay(this.previousValue);
                const curr = this.formatForDisplay(this.currentValue);
                this.addHistory(`${prev} ${this.operator} ${curr} = ${this.formatForDisplay(result)}`);

                // Update state to show result
                this.currentInput = this.formatForDisplay(result);
                this.currentValue = result;
                this.operator = null;
                this.previousValue = 0;
            }

            /**
             * Add calculation to history
             * @param {string} entry - Calculation string to add
             */
            addHistory(entry) {
                this.history.unshift(entry);
                if (this.history.length > 10) {
                    this.history.pop();
                }
                this.updateHistory();
            }

            /**
             * Update history display
             */
            updateHistory() {
                if (this.history.length === 0) {
                    this.historySection.innerHTML = '<div style="text-align: center; color: #999;">Calculation history will appear here</div>';
                    return;
                }

                this.historySection.innerHTML = this.history
                    .map(item => `<div class="history-item">${item}</div>`)
                    .join('');
            }

            /**
             * Keyboard input handler
             */
            setupKeyboardListeners() {
                document.addEventListener('keydown', (e) => {
                    // Only handle if calculator is active
                    if (!document.getElementById('calculator-app').classList.contains('active')) return;

                    if (e.key >= '0' && e.key <= '9') {
                        this.appendNumberDirect(parseInt(e.key));
                        this.updateDisplay();
                    } else if (e.key === '.') {
                        this.appendDecimal();
                        this.updateDisplay();
                    } else if (e.key === '+' || e.key === '-') {
                        this.setOperator(e.key === '+' ? '+' : '-');
                        this.updateDisplay();
                    } else if (e.key === '*') {
                        this.setOperator('×');
                        this.updateDisplay();
                    } else if (e.key === '/') {
                        e.preventDefault();
                        this.setOperator('÷');
                        this.updateDisplay();
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        this.compute();
                        this.updateDisplay();
                    } else if (e.key === 'Backspace') {
                        e.preventDefault();
                        this.deleteLastCharacter();
                        this.updateDisplay();
                    } else if (e.key === 'Escape') {
                        this.clear();
                        this.updateDisplay();
                    }
                });
            }

            /**
             * Update display to show current state
             */
            updateDisplay() {
                this.currentDisplay.textContent = this.currentInput || '0';
                
                // Show pending operation in previous operand
                if (this.operator) {
                    this.previousOperand.textContent = `${this.formatForDisplay(this.previousValue)} ${this.operator}`;
                } else {
                    this.previousOperand.textContent = '';
                }
            }
        }

        // ============================================================================
        // INITIALIZATION
        // ============================================================================
        
        // Initialize app manager
        const appManager = new AppManager();

        // Initialize calculator and register with app manager
        const calculator = new Calculator();
        appManager.registerApp('calculator', calculator);
    </script>
</body>
</html>
